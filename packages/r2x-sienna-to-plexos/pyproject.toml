[project]
name = "r2x-sienna-to-plexos"
version = "0.0.0"
description = "Translation helpers for Sienna-to-PLEXOS interoperability."
requires-python = ">=3.11, <3.14"
dependencies = ["r2x-plexos>=0.1.4,<1.0.0", "r2x-sienna>=0.2.0,<1.0.0"]

[project.entry-points."r2x.transforms"]
sienna-to-plexos = "r2x_sienna_to_plexos.translation:sienna_to_plexos"

[tool.setuptools.package-data]
r2x_sienna_to_plexos = ["config/*.json"]

[build-system]
requires = ["uv_build>=0.8.22,<0.9.0"]
build-backend = "uv_build"
