[project]
name = "r2x-plexos-to-sienna"
version = "0.1.0"
description = "Translation helpers for PLEXOS-to-Sienna interoperability."
requires-python = ">=3.11, <3.14"
dependencies = ["r2x-plexos>=0.1.4,<1.0.0", "r2x-sienna>=0.2.0,<1.0.0"]

[project.entry-points."r2x.transforms"]
plexos-to-sienna = "r2x_plexos_to_sienna.translation:plexos_to_sienna"

[tool.setuptools.package-data]
r2x_plexos_to_sienna = ["config/*.json"]

[build-system]
requires = ["uv_build>=0.8.22,<0.9.0"]
build-backend = "uv_build"
