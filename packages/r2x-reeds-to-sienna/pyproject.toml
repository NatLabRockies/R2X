[project]
name = "r2x-reeds-to-sienna"
version = "0.1.0"
description = "Translation helpers for ReEDS-to-Sienna interoperability."
requires-python = ">=3.11, <3.14"
dependencies = ["r2x-reeds>=0.3.0,<1.0.0", "r2x-sienna>=0.1.0,<1.0.0"]

[project.entry-points."r2x.transforms"]
reeds-to-sienna = "r2x_reeds_to_sienna.translation:reeds_to_sienna"

[tool.setuptools.package-data]
r2x_reeds_to_sienna = ["config/*.json"]

[build-system]
requires = ["uv_build>=0.8.22,<0.9.0"]
build-backend = "uv_build"
