name: on-commit

on:
  pull_request:
    types: [opened, reopened, synchronize, edited]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  UV_VERSION: "0.9.4"

jobs:
  lint-commit-messages:
    name: lint commit message
    runs-on: [ubuntu-latest]
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 2
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: ${{ env.UV_VERSION }}
      - name: Commitizen check
        run: |
          uvx --from commitizen cz check --rev-range HEAD^!

  lint-pr-title:
    # default: lints titles using https://github.com/commitizen/conventional-commit-types
    name: lint pr title
    runs-on: [ubuntu-latest]
    timeout-minutes: 5
    permissions:
      pull-requests: read # Required by action-semantic-pull-request to read PR title/body.
    steps:
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
